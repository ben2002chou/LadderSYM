data_root: ${oc.env:LADDERSYM_COCO_ROOT,''}
split_json: ${oc.env:LADDERSYM_COCO_SPLIT_JSON,''}

train:
  _target_: dataset.dataset_2_random_coco.Dataset # choosing which data class to use
  root_dir: ${..data_root}
  split: train
  split_json_path: ${..split_json}
  mel_length: ${mel_length}
  event_length: ${event_length}
  midi_folder: MIDI
  audio_filename: mix_16k.wav
  num_rows_per_batch: ${num_rows_per_batch}
  split_frame_length: ${split_frame_length}
  is_deterministic: ${dataset_is_deterministic}
  is_randomize_tokens: ${dataset_is_randomize_tokens}
  is_random_alignment_shift_augmentation: ${dataset_is_random_alignment_shift_augmentation}
  use_prompt: ${use_prompt}
val:
  _target_: dataset.dataset_2_random_coco.Dataset # choosing which data class to use
  root_dir: ${..data_root}
  split: valid
  split_json_path: ${..split_json}
  mel_length: ${mel_length}
  event_length: ${event_length}
  midi_folder: MIDI
  audio_filename: mix_16k.wav   
  num_rows_per_batch: ${num_rows_per_batch}
  split_frame_length: ${split_frame_length}
  is_deterministic: ${dataset_is_deterministic}
  is_randomize_tokens: ${dataset_is_randomize_tokens}
  use_prompt: ${use_prompt}
  
test:
  root_dir: ${..data_root}
  split: test
  split_json_path: ${..split_json}
  use_prompt: ${use_prompt}
collate_fn: dataset.dataset_2_random_coco.collate_fn
